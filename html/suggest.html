<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Đề Xuất Ý Tưởng - StringHub</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>💡 Đề Xuất Ý Tưởng</h1>
    <p>Chia sẻ ý tưởng giúp StringHub phát triển hơn.</p>
</header>

<div class="container">

    <div class="card">
        <h2>Gửi Ý Tưởng Mới</h2>

        <input type="text" placeholder="Tiêu đề ý tưởng">

        <select>
            <option>Tính năng mới</option>
            <option>Sản phẩm mới</option>
            <option>Khóa học âm nhạc</option>
            <option>Cộng đồng</option>
        </select>

        <textarea rows="6" placeholder="Mô tả chi tiết ý tưởng"></textarea>

        <button>🚀 Gửi Ý Tưởng</button>
    </div>

    <div class="card">
        <h2>Ý Tưởng Nổi Bật</h2>

        <div class="idea">
            <h3>🎹 Piano Ảo</h3>
            <p>Cho phép người dùng chơi piano trên web.</p>
            <span>👍 156</span>
        </div>

        <div class="idea">
            <h3>🎸 Guitar AI</h3>
            <p>AI hỗ trợ luyện tập guitar.</p>
            <span>👍 132</span>
        </div>
    </div>

</div>

</body>
</html>
